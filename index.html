<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lucy Lu · Day Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#100A0D;
    --card:rgba(255,255,255,0.045);
    --card-solid:#1A1015;
    --card2:rgba(255,255,255,0.03);
    --border:rgba(201,133,122,0.18);
    --border-soft:rgba(255,255,255,0.07);
    --rose:#C9857A;
    --rose-dim:rgba(201,133,122,0.2);
    --rose-deep:#8B4356;
    --rose-light:#E8B4A8;
    --rose-bg:rgba(201,133,122,0.08);
    --gold:#C8A45A;
    --gold-dim:rgba(200,164,90,0.25);
    --cream:#F0E8DC;
    --muted:#8A7070;
    --muted2:#6A5A5A;
    --text:#EAE0D8;
    --easy:#D4B896;
    --medium:#C9857A;
    --heavy:#8B4356;
    --shadow:0 8px 32px rgba(0,0,0,0.4);
    --shadow-rose:0 4px 20px rgba(201,133,122,0.15);
    --glass-blur:backdrop-filter:blur(20px);
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html { background:var(--bg); }
  body {
    font-family:'Outfit',sans-serif; color:var(--text);
    max-width:460px; margin:0 auto; padding:0 0 90px;
    min-height:100vh;
    background:
      radial-gradient(ellipse 80% 40% at 85% 10%, rgba(201,133,122,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 30% at 15% 80%, rgba(139,67,86,0.08) 0%, transparent 50%),
      radial-gradient(ellipse 100% 60% at 50% 50%, rgba(200,164,90,0.04) 0%, transparent 70%),
      var(--bg);
  }

  /* ── HEADER ─────────────────────────────────────────── */
  .header {
    padding:52px 24px 24px;
    position:relative;
  }
  .lucy-lu-mark {
    position:absolute;
    top:10px; right:14px;
    pointer-events:none;
    user-select:none;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .lucy-lu-text {
    font-family:'Pinyon Script',cursive;
    font-size:26px;
    color:var(--rose-light);
    line-height:1;
    letter-spacing:.02em;
    text-shadow:0 2px 10px rgba(201,133,122,0.4);
    margin-top:-6px;
    text-align:center;
  }
  .header-eyebrow {
    font-size:10px; font-weight:500; letter-spacing:.2em;
    text-transform:uppercase; color:var(--rose); margin-bottom:8px;
  }
  .header-title {
    font-family:'Fraunces',serif; font-size:34px; font-weight:300;
    color:var(--cream); line-height:1.1; letter-spacing:-.01em;
  }
  .header-title em {
    font-style:italic; font-weight:400; color:var(--rose-light);
  }
  .header-day { font-size:13px; color:var(--muted); margin-top:6px; font-weight:300; }

  /* ── BOTTOM NAV ─────────────────────────────────────── */
  .bottom-nav {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:460px;
    background:rgba(16,10,13,0.85);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    display:flex; z-index:100;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
  .nav-btn {
    flex:1; padding:14px 8px 12px; background:none; border:none;
    color:var(--muted2); font-family:'Outfit',sans-serif; font-size:11px;
    font-weight:500; letter-spacing:.06em; text-transform:uppercase;
    cursor:pointer; transition:color .2s; display:flex;
    flex-direction:column; align-items:center; gap:5px;
  }
  .nav-btn .nav-icon { font-size:19px; }
  .nav-btn.active { color:var(--rose-light); }
  .nav-dot { width:4px; height:4px; background:var(--rose); border-radius:50%; opacity:0; transition:opacity .2s; }
  .nav-btn.active .nav-dot { opacity:1; }

  /* ── TABS ───────────────────────────────────────────── */
  .tab { display:none; }
  .tab.active { display:block; }

  /* ── WEATHER GLASS CARD ─────────────────────────────── */
  .weather-widget {
    margin:4px 18px 22px;
    background:rgba(201,133,122,0.06);
    backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    border:1px solid var(--border);
    border-radius:20px;
    padding:20px;
    position:relative; overflow:hidden;
    box-shadow:var(--shadow-rose), inset 0 1px 0 rgba(255,255,255,0.06);
    min-height:72px;
  }
  .weather-widget::before {
    content:''; position:absolute; top:-40px; right:-40px;
    width:140px; height:140px;
    background:radial-gradient(circle,rgba(201,133,122,.2) 0%,transparent 60%);
    pointer-events:none;
  }
  .w-loading { font-size:13px; color:var(--muted); font-style:italic; }
  .w-error   { font-size:12px; color:var(--rose); line-height:1.5; }
  .w-top { display:flex; align-items:flex-start; gap:16px; }
  .w-icon { font-size:52px; line-height:1; flex-shrink:0; filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }
  .w-right { flex:1; }
  .w-temp {
    font-family:'Fraunces',serif; font-size:42px; font-weight:300;
    color:var(--rose-light); line-height:1; letter-spacing:-.02em;
  }
  .w-desc { font-size:14px; color:var(--cream); margin-top:3px; font-weight:400; }
  .w-feels { font-size:12px; color:var(--muted); margin-top:2px; font-weight:300; }
  .w-divider { height:1px; background:var(--border); margin:16px 0; }
  .w-stats { display:flex; }
  .w-stat { flex:1; text-align:center; }
  .w-stat+.w-stat { border-left:1px solid var(--border); }
  .w-stat-val { font-size:14px; font-weight:500; color:var(--rose-light); letter-spacing:.02em; }
  .w-stat-key { font-size:10px; color:var(--muted); margin-top:2px; letter-spacing:.08em; text-transform:uppercase; }
  .w-note {
    margin-top:16px; padding:11px 14px;
    background:var(--rose-bg);
    border:1px solid rgba(201,133,122,0.25);
    border-radius:12px;
    font-size:12px; color:var(--rose-light); line-height:1.6;
  }

  /* ── SECTION ────────────────────────────────────────── */
  .section { padding:0 18px 22px; }
  .section-label {
    font-size:10px; font-weight:500; letter-spacing:.16em;
    text-transform:uppercase; color:var(--muted); margin-bottom:12px;
  }

  /* ── INPUTS ─────────────────────────────────────────── */
  .field-input {
    width:100%;
    background:rgba(255,255,255,0.07);
    border:1px solid var(--border-soft);
    border-radius:10px;
    color:var(--cream); font-family:'Outfit',sans-serif; font-size:14px;
    padding:11px 13px; outline:none; transition:border-color .15s, background .15s;
  }
  .field-input:focus { border-color:var(--rose); background:rgba(201,133,122,0.08); }
  .field-input.error { border-color:var(--rose); }
  .field-input::placeholder { color:var(--muted); }
  /* Override Safari autofill yellow */
  .field-input:-webkit-autofill,
  .field-input:-webkit-autofill:hover,
  .field-input:-webkit-autofill:focus {
    -webkit-text-fill-color: var(--cream);
    -webkit-box-shadow: 0 0 0 1000px #2A1820 inset;
    transition: background-color 5000s ease-in-out 0s;
    caret-color: var(--cream);
  }

  .addr-row { display:flex; gap:8px; margin-top:8px; }
  .addr-street { flex:1.4; position:relative; }
  .addr-city-wrap { flex:1; position:relative; }
  .city-select {
    width:100%;
    background:rgba(255,255,255,0.07);
    border:1px solid var(--border-soft);
    border-radius:10px;
    color:var(--cream); font-family:'Outfit',sans-serif; font-size:14px;
    padding:11px 28px 11px 13px; outline:none;
    -webkit-appearance:none; appearance:none; cursor:pointer;
    transition:border-color .15s;
  }
  .city-select:focus { border-color:var(--rose); }
  .city-select.error { border-color:var(--rose); }
  .select-arrow { position:absolute; right:10px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--muted); font-size:10px; }
  .city-other { margin-top:6px; display:none; }
  .city-other.show { display:block; }

  .error-hint { font-size:11px; color:var(--rose-light); margin-top:5px; display:none; }
  .error-hint.show { display:block; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-4px)} 40%,80%{transform:translateX(4px)} }
  .shake { animation:shake .3s ease; }

  .time-row { display:flex; gap:10px; align-items:center; }
  .time-input {
    background:rgba(255,255,255,0.07); border:1px solid var(--border-soft);
    border-radius:10px; color:var(--cream); font-family:'Outfit',sans-serif;
    font-size:15px; padding:11px 13px; width:136px; outline:none; -webkit-appearance:none;
  }
  .time-input:focus { border-color:var(--rose); }

  /* ── AUTOCOMPLETE ────────────────────────────────────── */
  .autocomplete-list {
    position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:50;
    background:rgba(26,16,21,0.95);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border);
    border-radius:12px; overflow:hidden;
    box-shadow:var(--shadow); display:none;
  }
  .autocomplete-list.show { display:block; }
  .ac-item { padding:11px 13px; cursor:pointer; font-size:13px; border-bottom:1px solid rgba(255,255,255,0.05); transition:background .1s; }
  .ac-item:last-child { border-bottom:none; }
  .ac-item:active { background:var(--rose-bg); }
  .ac-name { color:var(--cream); font-weight:500; }
  .ac-addr { color:var(--muted); font-size:11px; margin-top:2px; }

  /* ── JOB CARDS ───────────────────────────────────────── */
  .jobs-list { display:flex; flex-direction:column; gap:10px; }
  .job-card {
    background:var(--card);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border-soft);
    border-radius:16px; padding:14px 14px 14px 46px; position:relative;
    box-shadow:0 2px 12px rgba(0,0,0,0.2);
  }
  .job-num {
    position:absolute; top:14px; left:14px; width:22px; height:22px;
    background:var(--rose-dim); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:500; color:var(--rose-light);
  }
  .job-remove { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--muted2); cursor:pointer; font-size:18px; line-height:1; padding:4px; }
  .job-remove:active { color:var(--rose); }
  .job-name-wrap { position:relative; }
  .job-name-input {
    width:100%; background:transparent; border:none;
    border-bottom:1px solid rgba(255,255,255,0.12);
    color:var(--cream); font-family:'Outfit',sans-serif; font-size:14px;
    padding:6px 0; outline:none; transition:border-color .15s;
  }
  .job-name-input::placeholder { color:var(--muted); }
  .job-name-input:focus { border-bottom-color:var(--rose); }
  .job-name-input.error { border-bottom-color:var(--rose); }

  .difficulty-row { display:flex; gap:6px; margin-top:11px; }
  .diff-btn {
    flex:1; padding:7px 4px; border-radius:8px;
    border:1px solid rgba(255,255,255,0.08);
    background:transparent; color:var(--muted2);
    font-family:'Outfit',sans-serif; font-size:11px; font-weight:500;
    cursor:pointer; transition:all .15s; letter-spacing:.03em;
  }
  .diff-btn.easy.active   { background:rgba(212,184,150,.12); border-color:var(--easy); color:var(--easy); }
  .diff-btn.medium.active { background:rgba(201,133,122,.12); border-color:var(--medium); color:var(--medium); }
  .diff-btn.heavy.active  { background:rgba(139,67,86,.15); border-color:var(--heavy); color:#C47A90; }

  .add-job-btn {
    width:100%; padding:13px; background:transparent;
    border:1px dashed rgba(201,133,122,0.25);
    border-radius:14px; color:var(--muted); font-family:'Outfit',sans-serif;
    font-size:13px; cursor:pointer; margin-top:10px; transition:all .15s;
  }
  .add-job-btn:active { border-color:var(--rose); color:var(--rose-light); }

  .plan-btn {
    width:calc(100% - 36px); margin:4px 18px 0; padding:17px;
    background:linear-gradient(135deg, #D4907A 0%, #A86060 100%);
    color:#fff; border:none; border-radius:16px;
    font-family:'Fraunces',serif; font-size:18px; font-weight:400;
    cursor:pointer; letter-spacing:.02em;
    box-shadow:0 4px 24px rgba(201,133,122,0.4);
    transition:opacity .15s, transform .1s;
    -webkit-appearance:none;
  }
  .plan-btn:active { opacity:.85; transform:scale(.98); }

  /* ── RESULT ──────────────────────────────────────────── */
  .result { margin:24px 18px 0; animation:fadeUp .4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

  .result-header {
    background:rgba(201,133,122,0.07);
    backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    border:1px solid var(--border);
    border-radius:20px 20px 0 0; padding:20px 20px 16px; border-bottom:none;
    box-shadow:var(--shadow-rose), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .depart-label { font-size:10px; font-weight:500; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  .depart-time { font-family:'Fraunces',serif; font-size:40px; font-weight:300; color:var(--rose-light); line-height:1; letter-spacing:-.02em; }
  .depart-reason { font-size:12px; color:var(--muted); margin-top:7px; line-height:1.55; font-weight:300; }
  .stats-row { display:flex; gap:1px; background:rgba(255,255,255,0.06); margin-top:16px; border-radius:10px; overflow:hidden; }
  .stat { flex:1; background:rgba(0,0,0,0.2); padding:11px 8px; text-align:center; }
  .stat-val { font-size:14px; font-weight:500; color:var(--cream); }
  .stat-key { font-size:10px; color:var(--muted); margin-top:2px; letter-spacing:.06em; text-transform:uppercase; }

  .result-stops {
    background:rgba(255,255,255,0.025);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border); border-top:none; padding:0 20px;
  }
  .stop-row { display:flex; gap:14px; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.05); align-items:flex-start; }
  .stop-row:last-child { border-bottom:none; }
  .stop-num {
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:500; flex-shrink:0; margin-top:1px;
  }
  .stop-num.easy   { background:rgba(212,184,150,.15); color:var(--easy); }
  .stop-num.medium { background:rgba(201,133,122,.15); color:var(--medium); }
  .stop-num.heavy  { background:rgba(139,67,86,.2); color:#C47A90; }
  .stop-info { flex:1; min-width:0; }
  .stop-name  { font-size:15px; font-weight:500; color:var(--cream); }
  .stop-addr  { font-size:12px; color:var(--muted); margin-top:2px; }
  .stop-times { font-size:12px; color:var(--rose-light); margin-top:3px; }
  .stop-dur   { font-size:11px; color:var(--muted); margin-top:1px; }
  .stop-note  { font-size:11px; color:var(--muted2); margin-top:3px; font-style:italic; }

  .result-footer {
    background:rgba(255,255,255,0.025);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border); border-top:1px solid rgba(255,255,255,0.04);
    border-radius:0 0 20px 20px; padding:16px 20px;
  }
  .energy-note { font-size:12px; color:var(--muted); line-height:1.65; font-style:italic; }
  .maps-btn {
    display:block; width:100%; padding:16px;
    background:linear-gradient(135deg,var(--gold) 0%,#A8883A 100%);
    border:none; border-radius:14px; color:#0F0A0D;
    font-family:'Outfit',sans-serif; font-size:14px; font-weight:600;
    text-align:center; text-decoration:none; margin-top:14px;
    letter-spacing:.04em;
    box-shadow:0 4px 16px rgba(200,164,90,0.3);
    transition:opacity .15s;
  }
  .maps-btn:active { opacity:.8; }
  .reset-btn {
    display:block; width:100%; padding:13px; background:transparent;
    border:1px solid rgba(255,255,255,0.08); border-radius:14px;
    color:var(--muted); font-family:'Outfit',sans-serif; font-size:13px;
    cursor:pointer; margin-top:10px;
  }
  .dep-preview {
    background:rgba(201,133,122,0.07);
    border:1px solid rgba(201,133,122,0.2);
    border-radius:12px;
    padding:12px 14px;
    animation:fadeUp .25s ease;
  }
  .dep-preview-time {
    font-family:'Fraunces',serif;
    font-size:22px; font-weight:300;
    color:var(--rose-light); line-height:1;
    letter-spacing:-.01em;
  }
  .dep-preview-time span {
    font-size:11px; font-weight:400;
    color:var(--rose); margin-left:6px;
    letter-spacing:.08em; text-transform:uppercase;
    vertical-align:middle;
  }
  .dep-preview-reason {
    font-size:12px; color:var(--muted);
    margin-top:6px; line-height:1.5; font-weight:300;
  }

  .actual-capture {
    border-top:1px solid rgba(255,255,255,0.06);
    padding-top:14px;
  }
  .actual-label {
    font-size:12px; font-weight:500; color:var(--muted);
    letter-spacing:.06em; text-transform:uppercase; margin-bottom:12px;
  }
  .actual-row {
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; margin-bottom:10px;
  }
  .actual-name {
    font-size:13px; color:var(--cream); font-weight:500;
    flex-shrink:0; max-width:90px; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap;
  }
  .actual-btns { display:flex; gap:5px; flex:1; justify-content:flex-end; }
  .actual-btn {
    padding:5px 8px; border-radius:8px; border:1px solid;
    font-family:'Outfit',sans-serif; font-size:10px; font-weight:500;
    cursor:pointer; white-space:nowrap; transition:opacity .15s;
    letter-spacing:.03em;
  }
  .actual-btn:active { opacity:.7; }
  .actual-btn.under  { background:rgba(212,184,150,.1); border-color:var(--easy); color:var(--easy); }
  .actual-btn.ontime { background:rgba(201,133,122,.1); border-color:var(--rose); color:var(--rose-light); }
  .actual-btn.over   { background:rgba(139,67,86,.12); border-color:var(--heavy); color:#C47A90; }

  /* ── CLIENTS TAB ─────────────────────────────────────── */
  .add-client-form {
    background:var(--card);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border-soft);
    border-radius:18px; padding:18px; margin-bottom:18px;
    box-shadow:0 2px 12px rgba(0,0,0,0.2);
  }
  .add-client-form .section-label { color:var(--rose-light); margin-bottom:16px; }
  .form-field { margin-bottom:12px; }
  .form-label { font-size:11px; color:var(--muted); margin-bottom:5px; letter-spacing:.08em; text-transform:uppercase; }
  .save-client-btn {
    width:100%; padding:14px;
    background:linear-gradient(135deg,#D4907A 0%,#A86060 100%) !important;
    color:#fff !important; border:none; border-radius:12px;
    font-family:'Fraunces',serif; font-size:16px; font-weight:400;
    cursor:pointer; margin-top:8px; letter-spacing:.02em;
    box-shadow:0 4px 16px rgba(201,133,122,0.3);
    -webkit-appearance:none; appearance:none;
    display:block;
  }
  .save-client-btn:active { opacity:.85; }

  .client-roster { display:flex; flex-direction:column; gap:10px; }
  .client-card {
    background:var(--card);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--border-soft);
    border-radius:14px; padding:14px 44px 14px 14px; position:relative;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .client-card-name { font-size:15px; font-weight:500; color:var(--cream); }
  .client-card-addr { font-size:12px; color:var(--muted); margin-top:3px; }
  .client-card-type {
    display:inline-block; margin-top:8px; padding:3px 9px;
    border-radius:6px; font-size:10px; font-weight:500;
    letter-spacing:.07em; text-transform:uppercase;
  }
  .client-card-type.easy   { background:rgba(212,184,150,.12); color:var(--easy); }
  .client-card-type.medium { background:rgba(201,133,122,.12); color:var(--medium); }
  .client-card-type.heavy  { background:rgba(139,67,86,.15); color:#C47A90; }
  .client-delete { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--muted2); cursor:pointer; font-size:17px; padding:4px; }
  .client-delete:active { color:var(--rose); }

  .empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; line-height:1.7; }
  .empty-icon { font-size:36px; margin-bottom:12px; }

  /* ── SCHEDULE TAB ─────────────────────────────────────── */
  .week-nav {

  .sched-freq-btn { min-height:44px; }
  .sched-day-btn { min-height:44px; }

<script>
  const CITIES=['Bentonville','Rogers','Centerton','Springdale','Fayetteville',
                'Bella Vista','Cave Springs','Lowell','Pea Ridge','Siloam Springs'];
  const DRIVE_MIN=15, JOB_HOURS={easy:1.5,medium:2.5,heavy:3.5};
  const DIFF_ORDER={heavy:0,medium:1,easy:2};
  const DIFF_EMOJI={easy:'🌸',medium:'🏠',heavy:'💪'};
  const DIFF_LABEL={easy:'Light clean',medium:'Standard clean',heavy:'Deep clean'};
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const LAT=36.37, LON=-94.21;
  let jobs=[], jobId=0, ncd='medium';
  const now=new Date();
  document.getElementById('dayDisplay').textContent=
    `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;

  // Storage
  function getClients(){try{return JSON.parse(localStorage.getItem('lucy-clients')||'[]');}catch{return[];}}
  function saveClients(l){localStorage.setItem('lucy-clients',JSON.stringify(l));}
  function getStart(){try{return JSON.parse(localStorage.getItem('lucy-start')||'{}');}catch{return{};}}
  function saveStart(s,c){localStorage.setItem('lucy-start',JSON.stringify({street:s,city:c}));}

  // Skip storage — keyed by "clientId-dateStr", auto-cleans entries older than 30 days
  function getSkips(){try{return JSON.parse(localStorage.getItem('lucy-skips')||'{}');}catch{return{};}}
  function saveSkips(o){localStorage.setItem('lucy-skips',JSON.stringify(o));}
  function cleanSkips(){
    var skips=getSkips(), now30=new Date();
    now30.setDate(now30.getDate()-30);
    var cutoff=isoDate(now30);
    var cleaned={};
    Object.keys(skips).forEach(function(k){
      var parts=k.split('-').slice(1).join('-'); // extract date portion
      if(parts>=cutoff) cleaned[k]=skips[k];
    });

  function minsToTime(m){const h=Math.floor(m/60),mn=m%60,ap=h>=12?'PM':'AM',h12=h%12||12;return`${h12}:${String(mn).padStart(2,'0')} ${ap}`;}
  function timeToMins(s){
    if(!s||typeof s!=='string')return 8*60;
    // Handle both HH:MM (24h) and H:MM AM/PM (12h)
    var clean=s.trim();
    var isPM=clean.toLowerCase().includes('pm');
    var isAM=clean.toLowerCase().includes('am');
    clean=clean.replace(/[apm\s]/gi,'');
    var parts=clean.split(':');
    var h=parseInt(parts[0])||0;
    var m=parseInt(parts[1])||0;
    if(isPM&&h!==12)h+=12;
    if(isAM&&h===12)h=0;
    return h*60+m;
  }

  function weatherTrafficNote(wx,peakWindow){
    if(!wx)return'';
    if(wx.isIce)return' Black ice is possible — allow extra time and drive carefully.';
    if(wx.isRain&&peakWindow)return' Rain during peak hours makes I-49 significantly worse — consider extra buffer.';

  function recommendDep(mins,dow){
    const isWknd=dow===0||dow===6;
    const wx=getWeatherContext();
    const wxP=weatherTrafficNote(wx,true);
    const wxN=weatherTrafficNote(wx,false);

    if(isWknd){
      if(dow===6&&mins>=12*60&&mins<17*60)
        return{mins,reason:'Weekend traffic is generally light, but the Pinnacle Hills corridor in Rogers gets busy on Saturday afternoons. Allow extra time if heading that direction.'+wxN};
      return{mins,reason:'Weekend — minimal traffic. Roads should be clear all day.'+wxN};
    }

    if(mins<6*60+30)
      return{mins,reason:'Very early start — roads are quiet and I-49 is clear. Best window of the day.'+wxN};
    if(mins<7*60)
      return{mins,reason:'Roads are still light, but school zones in Bentonville and Rogers activate around 7 AM on school days. Watch for reduced speed limits near schools.'+wxN};
    if(mins<7*60+30)
      return{mins,reason:'Morning traffic is building on I-49 and 71B. School zones are active 7–8:15 AM — allow extra time near Bentonville and Rogers schools.'+wxP};
    if(mins<=9*60)
      return{mins:9*60+15,reason:'Peak congestion window — I-49 and 71B are heavily backed up 7:30–9 AM. School zones also active. Pushing to 9:15 skips both and saves real time.'+wxP};
    if(mins<9*60+15)
      return{mins:9*60+15,reason:'Traffic is just starting to clear. Waiting until 9:15 avoids the tail end of the morning rush entirely.'+wxN};
    if(mins<11*60+30)
      return{mins,reason:'Good window — morning rush has fully cleared on I-49 and 71B. One of the smoothest driving windows of the day.'+wxN};
    if(mins<13*60)
      return{mins,reason:'Midday traffic is picking up — lunch hour brings extra congestion around Walmart HQ, the Bentonville square, and Rogers town center.'+wxN};
    if(mins<14*60+30)
      return{mins,reason:'Post-lunch window is reasonable. Traffic has calmed from the noon rush and the afternoon buildup has not started yet.'+wxN};
    if(mins<15*60)
      return{mins:15*60+45,reason:'School zones reactivate around 3 PM in Bentonville and Rogers, and the Walmart HQ shift change hits at the same time. Pushing to 3:45 avoids both.'+wxP};
    if(mins<15*60+45)
      return{mins:15*60+45,reason:'You are in the worst overlap — school dismissal and Walmart shift change together. Pushing to 3:45 is worth it.'+wxP};
    if(mins<18*60)
      return{mins,reason:'Afternoon rush is running on I-49 — expect slower traffic between Bentonville and Rogers until around 6 PM. Allow extra buffer between jobs.'+wxP};
    return{mins,reason:'Evening traffic has cleared. Roads should be smooth at this hour.'+wxN};
  }

    function getActualAvg(difficulty){
    // Pull from stored actual times if available
    try{
      const history = JSON.parse(localStorage.getItem('lucy-actuals')||'[]');
      const relevant = history.filter(h=>h.difficulty===difficulty);
      if(relevant.length<2) return null;
      const avg = relevant.reduce((s,h)=>s+h.actualHours,0)/relevant.length;
      return Math.round(avg*10)/10;
    }catch{return null;}
  }

  function bufferNote(seq){
    const notes=[];
    seq.forEach(job=>{
      const planned = JOB_HOURS[job.difficulty];
      const avg = getActualAvg(job.difficulty);
      if(avg && avg > planned+0.2){
        const diff = Math.round((avg-planned)*60);
        notes.push(`Your ${DIFF_LABEL[job.difficulty].toLowerCase()}s have been running about ${diff} min over estimate lately`);
      }
    });
    const hasHeavy = seq.some(j=>j.difficulty==='heavy');
    if(hasHeavy && !notes.length){
      notes.push('Deep cleans often run 20–30 min over estimate — consider building in a small buffer');
    }
    return notes.length ? notes[0] + '.' : null;
  }

  function energyNote(seq){
    const buffer = bufferNote(seq);
    let base='';
    if(seq[0]?.difficulty==='heavy') base='Deep clean is first while your energy is highest — lighter work carries you through the afternoon.';
    else if(seq[seq.length-1]?.difficulty==='easy') base='Hardest jobs lead the day so fatigue works in your favor as the jobs get lighter.';
    else base='Jobs ordered to front-load effort and protect your energy through the day.';
    return buffer ? base + ' ' + buffer : base;
  }

  function logActual(idx, result, difficulty, plannedMins){
    const adjustments = {under: -0.33, ontime: 0, over: 0.42};
    const actualHours = Math.round((plannedMins/60 + adjustments[result])*10)/10;
    try{
      const history = JSON.parse(localStorage.getItem('lucy-actuals')||'[]');
      history.push({difficulty, actualHours, date: new Date().toISOString().slice(0,10)});
      // Keep last 20 entries only
      if(history.length>20) history.shift();
      localStorage.setItem('lucy-actuals', JSON.stringify(history));
    }catch{}
    // Visual feedback
    const row = document.querySelectorAll('.actual-row')[idx];
    if(row){
      row.innerHTML=`<span class="actual-name" style="color:var(--rose-light)">✓ Logged</span>`;
    }
  }

  function planDay(){
    let err=false;
    const ss=document.getElementById('startStreet').value.trim();
    const sc=getCity('startCity','startCityOther');
    if(!ss){markErr('startStreet','startErr');err=true;}
    if(!sc){markErr('startCity','startErr');err=true;}
    if(ss&&sc)saveStart(ss,sc);

    jobs.forEach(j=>{
      const ne=document.getElementById(`jname-${j.id}`);
      const se=document.getElementById(`jstreet-${j.id}`);
      const ce=document.getElementById(`jcity-${j.id}`);
      const oe=document.getElementById(`jcityother-${j.id}`);
      if(ne)j.name=ne.value.trim();if(se)j.street=se.value.trim();
      if(ce)j.city=ce.value;if(oe)j.cityOther=oe.value.trim();
    });

    const valid=jobs.filter(j=>{const c=j.city==='other'?j.cityOther:j.city;return j.name&&j.street&&c;});
    jobs.filter(j=>j.name||j.street||j.city).forEach(j=>{
      const c=j.city==='other'?j.cityOther:j.city;
      if(!j.name){markErr(`jname-${j.id}`,`jerr-${j.id}`);err=true;}
      if(!j.street){markErr(`jstreet-${j.id}`,`jerr-${j.id}`);err=true;}
      if(!c){markErr(`jcity-${j.id}`,`jerr-${j.id}`);err=true;}
    });
    if(!valid.length){if(!err)alert('Add at least one complete job.');return;}
    if(err)return;

    const dep=recommendDep(timeToMins(document.getElementById('startTime').value),now.getDay());
    const seq=[...valid].sort((a,b)=>DIFF_ORDER[a.difficulty]-DIFF_ORDER[b.difficulty]);
    let cursor=dep.mins;
    const stops=seq.map(job=>{
      const city=job.city==='other'?job.cityOther:job.city;
      const addr=`${job.street}, ${city}, AR`;
      const dur=Math.round(JOB_HOURS[job.difficulty]*60);
      const arr=cursor,dep2=arr+dur;
      const notes={heavy:'Tackling the longest job fresh — smart energy management.',medium:'Mid-day pacing — steady effort.',easy:'Finishing light keeps the end of the day manageable.'};
      cursor=dep2+DRIVE_MIN;
      return{name:job.name,address:addr,difficulty:job.difficulty,arrival:minsToTime(arr),departure:minsToTime(dep2),duration:JOB_HOURS[job.difficulty]===1.5?'~1.5 hrs':JOB_HOURS[job.difficulty]===2.5?'~2.5 hrs':'~3.5 hrs',note:notes[job.difficulty]};
    });

    const finish=cursor-DRIVE_MIN,driveTotal=(stops.length-1)*DRIVE_MIN;
    const startFull=`${ss}, ${sc}, AR`;
    const mapsUrl=`https://www.google.com/maps/dir/${[startFull,...stops.map(s=>s.address)].map(encodeURIComponent).join('/')}`;

    document.getElementById('result').innerHTML=`
      <div class="result-header">
        <div class="depart-label">Leave at</div>
        <div class="depart-time">${minsToTime(dep.mins)}</div>
        <div class="depart-reason">${esc(dep.reason)}</div>
        <div class="stats-row">
          <div class="stat"><div class="stat-val">${minsToTime(finish)}</div><div class="stat-key">Done by</div></div>
          <div class="stat"><div class="stat-val">${stops.length}</div><div class="stat-key">Stops</div></div>
          ${stops.length>1?`<div class="stat"><div class="stat-val">~${driveTotal} min</div><div class="stat-key">Drive</div></div>`:`<div class="stat"><div class="stat-val">1 stop</div><div class="stat-key">Today</div></div>`}
        </div>
      </div>
      <div class="result-stops">${stops.map(s=>`
        <div class="stop-row">
          <div class="stop-num ${s.difficulty}">${DIFF_EMOJI[s.difficulty]}</div>
          <div class="stop-info">
            <div class="stop-name">${esc(s.name)}</div>
            <div class="stop-addr">${esc(s.address)}</div>
            <div class="stop-times">Arrive ${s.arrival} · Leave ${s.departure}</div>
            <div class="stop-dur">${s.duration} · ${DIFF_LABEL[s.difficulty]}</div>
            <div class="stop-note">${s.note}</div>
          </div>
        </div>`).join('')}
      </div>
      <div class="result-footer">
        <div class="energy-note">⚡ ${energyNote(stops)}</div>
        <a href="${mapsUrl}" target="_blank" class="maps-btn">Open Route in Google Maps →</a>
        <div class="actual-capture" id="actualCapture" style="margin-top:14px;">
          <div class="actual-label">How did today go? <span style="color:var(--muted);font-weight:300;font-size:11px;">(helps improve estimates)</span></div>
          ${buildActualRows(stops)}
        </div>
        <button class="reset-btn" onclick="document.getElementById('result').style.display='none';window.scrollTo({top:0,behavior:'smooth'})">← Edit Jobs</button>
      </div>`;
    document.getElementById('result').style.display='block';
    document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
  }
  // ── Schedule ──────────────────────────────────────────────────
  var schedWeekOffset = 0;
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DAY_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  function getMondayOfWeek(date){
    var d = new Date(date);
    var day = d.getDay();
    var diff = day===0 ? -6 : 1-day;
    d.setDate(d.getDate()+diff);
    d.setHours(0,0,0,0);
    return d;
  }

  function getWeekDates(offset){
    var monday = getMondayOfWeek(now);
    monday.setDate(monday.getDate() + offset*7);
    var dates = [];
    for(var i=0;i<7;i++){
      var d = new Date(monday);
      d.setDate(d.getDate()+i);
      dates.push(d);
    }
    return dates;
  }

  function isoDate(d){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  function isOnWeek(biweeklyRef, date){
    // Returns true if date's week is an "on" week relative to biweeklyRef
    var ref = getMondayOfWeek(new Date(biweeklyRef));
    var cur = getMondayOfWeek(new Date(date));
    var diff = Math.round((cur-ref)/(7*24*60*60*1000));
    return diff%2===0;
  }

  function isScheduledOn(client, date){
    if(!client.schedule||client.schedule.frequency==='none')return false;
    var dow = date.getDay();
    var days = client.schedule.days||[];
    if(!days.includes(dow))return false;
    if(client.schedule.frequency==='weekly')return true;
    if(client.schedule.frequency==='biweekly'){
      var ref = client.schedule.biweeklyRef||isoDate(getMondayOfWeek(now));
      return isOnWeek(ref, date);
    }
    return false;
  }

  function getClientsForDate(date){
    return getClients().filter(c=>isScheduledOn(c,date));
  }

  function changeWeek(dir){
    schedWeekOffset += dir;
    renderScheduleTab();
  }

  function planFromSchedule(dateStr){
    var date = new Date(dateStr+'T12:00:00');
    // Filter out skipped clients for this date
    var scheduled = getClientsForDate(date).filter(function(c){
      return !isSkipped(c.id, dateStr);
    });
    if(!scheduled.length){alert('No clients scheduled for this day (or all are skipped).');return;}
    jobs = [];
    jobId = 0;
    scheduled.forEach(function(c){
      jobs.push({id:++jobId,name:c.name,street:c.street,city:c.city,cityOther:'',difficulty:c.difficulty,notes:c.notes||''});
    });
    // Store the planned date's DOW so departure advice uses correct day
    window._plannedDow = date.getDay();
    switchTab('plan');
    renderJobs();
    // Update departure preview with correct day of week
    setTimeout(function(){
      updateDepPreviewForDow(date.getDay());
      var section = document.querySelector('#tab-plan .section');
      if(section) section.scrollIntoView({behavior:'smooth',block:'start'});
    }, 100);
  }

  function renderScheduleTab(){
    cleanSkips();
    var dates = getWeekDates(schedWeekOffset);
    var todayStr = isoDate(now);

    // Week range header
    var first = dates[0], last = dates[6];
    var rangeStr = MONTHS[first.getMonth()]+' '+first.getDate();
    if(first.getMonth()!==last.getMonth()) rangeStr += ' – '+MONTHS[last.getMonth()]+' '+last.getDate();
    else rangeStr += '–'+last.getDate();
    rangeStr += ', '+first.getFullYear();
    document.getElementById('weekRange').textContent = rangeStr;

    var html = '';
    dates.forEach(function(date){
      var ds = isoDate(date);
      var isToday = ds===todayStr;
      var dayClients = getClientsForDate(date);
      var isEmpty = dayClients.length===0;

      html += '<div class="day-card'+(isToday?' today':'')+'">';
      html += '<div class="day-header">';
      html += '<div class="day-name-wrap">';
      html += '<span class="day-name">'+DAY_NAMES[date.getDay()]+'</span>';
      html += '<span class="day-num">'+date.getDate()+'</span>';
      html += '</div>';
      if(isToday) html += '<span class="today-pill">Today</span>';
      html += '</div>';

      if(isEmpty){
        html += '<div class="day-empty">No jobs scheduled</div>';
      } else {
        html += '<div class="day-jobs">';
        var allSkipped = true;
        dayClients.forEach(function(c){
          var skipped = isSkipped(c.id, ds);
          if(!skipped) allSkipped = false;
          html += '<div class="day-job-row'+(skipped?' skipped':'')+'">';
          html += '<span class="day-job-icon">'+DIFF_EMOJI[c.difficulty]+'</span>';
          html += '<div class="day-job-info">';
          html += '<div class="day-job-name">'+esc(c.name)+'</div>';
          html += '<div class="day-job-type">'+DIFF_LABEL[c.difficulty]+'</div>';
          html += '</div>';
          html += '<button class="skip-btn" onclick="toggleSkip('+c.id+',&quot;'+ds+'&quot;)">'
            +(skipped?'Restore':'Skip')+'</button>';
          html += '</div>';
        });
        html += '</div>';
        if(!allSkipped){
          html += '<button class="day-plan-btn" onclick="planFromSchedule(&quot;'+ds+'&quot;)">Plan this day →</button>';
        }
      }
      html += '</div>';
    });

    document.getElementById('dayCards').innerHTML = html;
  }

  // ── Client schedule editing ───────────────────────────────────
  function updateClientSchedule(id, field, value){
    var clients = getClients();
    clients = clients.map(function(c){
      if(c.id!==id)return c;
      if(!c.schedule)c.schedule={frequency:'none',days:[],biweeklyRef:isoDate(getMondayOfWeek(now))};
      if(field==='frequency'){
        c.schedule.frequency=value;
        if(value==='biweekly'&&!c.schedule.biweeklyRef)
          c.schedule.biweeklyRef=isoDate(getMondayOfWeek(now));
      } else if(field==='day'){
        var days=c.schedule.days||[];
        var idx=days.indexOf(value);
        if(idx>=0)days.splice(idx,1); else days.push(value);
        c.schedule.days=days;
      }
      return c;
    });
    saveClients(clients);
    renderRoster();
  }

  function getNextOccurrences(sched, count){
    // Returns next N occurrence dates as strings
    var results=[];
    if(!sched||sched.frequency==='none'||!sched.days||!sched.days.length) return results;
    var d=new Date(now);
    d.setHours(0,0,0,0);
    var limit=200; // max days to scan
    while(results.length<count && limit-->0){
      d.setDate(d.getDate()+1);
      if(!sched.days.includes(d.getDay())) continue;
      if(sched.frequency==='weekly'){ results.push(new Date(d)); continue; }
      if(sched.frequency==='biweekly'){
        var ref=sched.biweeklyRef||isoDate(getMondayOfWeek(now));
        if(isOnWeek(ref,d)) results.push(new Date(d));
      }
    }
    return results;
  }

  function flipBiweeklyRef(clientId){
    var clients=getClients();
    clients=clients.map(function(c){
      if(c.id!==clientId) return c;
      if(!c.schedule) return c;
      var ref=new Date((c.schedule.biweeklyRef||isoDate(getMondayOfWeek(now)))+'T12:00:00');
      ref.setDate(ref.getDate()+7);
      c.schedule.biweeklyRef=isoDate(ref);
      return c;
    });
    saveClients(clients);
    renderRoster();
  }

  function renderClientScheduleEditor(c){
    var sched=c.schedule||{frequency:'none',days:[],biweeklyRef:''};
    var freq=sched.frequency||'none';
    var days=sched.days||[];
    var cid=c.id;
    var html='<div class="client-schedule">';
    html+='<div class="sched-label">Recurring Schedule</div>';
    html+='<div class="sched-freq-row">';
    var freqs=[['none','None'],['weekly','Weekly'],['biweekly','Biweekly']];
    freqs.forEach(function(pair){
      var f=pair[0],label=pair[1];
      var act=freq===f?' active':'';
      html+='<button class="sched-freq-btn'+act+'" onclick="updateClientSchedule('+cid+',&quot;frequency&quot;,&quot;'+f+'&quot;)">'+label+'</button>';
    });
    html+='</div>';
    if(freq!=='none'){
      html+='<div class="sched-days-row">';
      var dayPairs=[[1,'M'],[2,'T'],[3,'W'],[4,'T'],[5,'F'],[6,'S'],[0,'Su']];
      dayPairs.forEach(function(pair){
        var dow=pair[0],lbl=pair[1];
        var act=days.includes(dow)?' active':'';
        html+='<button class="sched-day-btn'+act+'" onclick="updateClientSchedule('+cid+',&quot;day&quot;,'+dow+')">'+lbl+'</button>';
      });
      html+='</div>';

      // Show next occurrences preview
      var next=getNextOccurrences(sched,4);
      if(next.length){
        html+='<div class="sched-next-label">Next visits:</div>';
        html+='<div class="sched-next-dates">';
        next.forEach(function(d){
          html+='<span class="sched-next-date">'+DAY_NAMES[d.getDay()]+' '+MONTHS[d.getMonth()].slice(0,3)+' '+d.getDate()+'</span>';
        });
        html+='</div>';
      }

      if(freq==='biweekly'){
        html+='<div class="sched-biweekly-row">';
        html+='<div class="sched-biweekly-note">Every other week — does this look right?</div>';
        html+='<button class="sched-flip-btn" onclick="flipBiweeklyRef('+cid+')">Shift by one week</button>';
        html+='</div>';
      }
    }
    html+='</div>';
    return html;
  }
</script>
